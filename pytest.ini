[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths to discover
testpaths = tests

# Output and reporting options
addopts = 
    -v
    --tb=short
    --strict-markers

# Markers
markers =
    unit: fast tests that do not launch a browser
    smoke: launches a browser and performs minimal checks

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_file = tests/pytest.log
log_file_level = DEBUG

# Pytest timeout for long-running tests
timeout = 300

# Strict xfail behavior
xfail_strict = false
