# Browser Launcher Configuration
# This file contains settings for the browser launcher

[general]
# Default browser to use (chrome, firefox, safari, edge)
default_browser = "chrome"

# Default timeout for browser operations (in seconds)
timeout = 30

[logging]
# Logging configuration
# Log level options: DEBUG, INFO, WARNING, ERROR
default_log_level = "INFO"

# Enable console logging (true/false)
console_logging = false

# Maximum log file size in bytes (10MB = 10485760)
max_log_size = 10485760

# Number of backup log files to keep
backup_count = 5

# Days to keep old log files (0 = never cleanup)
log_cleanup_days = 30

[urls]
# Default URLs to open
homepage = "https://www.microsoft.com"

[browsers]
# Browser-specific settings
[chrome]
binary_path = ""
headless = false

[firefox]
binary_path = ""
headless = false

[safari]
binary_path = ""
headless = false

[edge]
binary_path = ""
headless = false

# Authentication Configuration
# ──────────────────────────────────────────────────────────────────────
# The auth framework discovers authentication modules via Python entry
# points registered under the "browser_launcher.authenticators" group.
# Settings here act as global defaults.  Module-specific and
# user/env-specific overrides are supported (see examples below).
# ──────────────────────────────────────────────────────────────────────
[auth]
# Global authentication defaults
timeout_seconds = 30        # Max seconds to wait for auth to complete
retry_attempts = 3          # Number of retry attempts on failure
retry_delay_seconds = 1.0   # Delay between retries (seconds)
headless = true             # Run auth browser in headless mode
page_load_timeout = 20      # Max seconds to wait for page loads
element_wait_timeout = 10   # Max seconds to wait for page elements
screenshot_on_failure = false  # Take screenshot when auth fails
# screenshot_directory = "/tmp/auth_screenshots"  # Where to save failure screenshots
# user_agent = ""           # Custom user agent string (empty = browser default)
# window_size = [1920, 1080]  # Browser window size [width, height]
# allowed_domains = []      # Restrict auth to these domains (empty = allow all)
# required_cookies = []     # Cookie names that must be present after auth

# ── Module-specific configuration ─────────────────────────────────────
# Each auth module can have its own section: [auth.<module_name>]
# Values here override the global [auth] defaults for that module.
#
# Form-based authentication (entry point: "form_auth")
# Registered class: examples.auth_modules.form_auth:FormAuthenticator
#
# [auth.form_auth]
# timeout_seconds = 45
# element_wait_timeout = 10
# page_load_timeout = 20
# screenshot_on_failure = true
# screenshot_directory = "/tmp/auth_screenshots"
# credentials = { username = "alice@example.com", password = "s3cret" }
# allowed_domains = ["example.com", "test.example.com"]
# required_cookies = ["session_id", "auth_token"]
# custom_options = {
#   login_url = "https://example.com/login",
#   username_field = "input#email",
#   password_field = "input#passwd",
#   submit_button = "button.login-btn",
#   success_indicator = ".dashboard-header",
#   pre_login_delay = 0.5,
#   post_login_delay = 1.0,
# }

# OAuth / third-party auth example (hypothetical entry point: "oauth")
#
# [auth.oauth]
# timeout_seconds = 60
# credentials = { client_id = "your_client_id", redirect_uri = "https://localhost:8080/callback" }
# custom_options = { popup_window = true, auto_close = true }

# Dummy authenticator (entry point: "dummy") — always succeeds, useful for testing
# No extra configuration required; ships with the package.

# ── Per-user / per-environment overrides ──────────────────────────────
# Resolution order (later overrides earlier):
#   1. [auth]                           — global defaults
#   2. [auth.<module>]                  — module defaults
#   3. [users.<user>.<env>.auth]        — user/env overrides
#   4. [users.<user>.<env>.auth.<mod>]  — user/env module overrides
#
# [users.alice.prod.auth]
# timeout_seconds = 45
# screenshot_on_failure = true
# screenshot_directory = "/tmp/auth_screenshots"

# Optional post-auth navigation target path (root-relative only).
# Used when --target-url is not provided on CLI.
# [users.alice.prod.urls]
# auth_path = "/ui"

# [users.alice.prod.auth.form_auth]
# credentials = { username = "alice@company.com" }
# allowed_domains = ["company.com", "app.company.com"]
