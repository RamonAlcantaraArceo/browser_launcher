# Browser Launcher Configuration
# This file contains settings for the browser launcher

[general]
# Default browser to use (chrome, firefox, safari, edge)
default_browser = "chrome"

# Default timeout for browser operations (in seconds)
timeout = 30

[logging]
# Logging configuration
# Log level options: DEBUG, INFO, WARNING, ERROR
default_log_level = "INFO"

# Enable console logging (true/false)
console_logging = false

# Maximum log file size in bytes (10MB = 10485760)
max_log_size = 10485760

# Number of backup log files to keep
backup_count = 5

# Days to keep old log files (0 = never cleanup)
log_cleanup_days = 30

[urls]
# Default URLs to open
homepage = "https://www.microsoft.com"

[browsers]
# Browser-specific settings
[chrome]
binary_path = ""
headless = false

[firefox]
binary_path = ""
headless = false

[safari]
binary_path = ""
headless = false

[edge]
binary_path = ""
headless = false

# Authentication Configuration
[auth]
# Global authentication defaults
timeout_seconds = 30
retry_attempts = 3
retry_delay_seconds = 1.0
headless = true
page_load_timeout = 20
element_wait_timeout = 10
screenshot_on_failure = false

# Example module-specific configurations
# [auth.form_auth]
# timeout_seconds = 45
# credentials = { username_field = "email", password_field = "password" }
# allowed_domains = ["example.com", "test.example.com"]
