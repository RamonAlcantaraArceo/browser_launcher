name: Tests with Allure Reporting

on:
  push:
    branches: [fix/allure]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13', '3.14']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: '2.2.1'
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-test-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
          
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: |
          poetry install --with dev --verbose
          
      - name: Verify installation
        run: |
          poetry run python --version
          poetry run pytest --version

      - name: Run unit tests with coverage
        env:
          ALLURE_PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          poetry run pytest tests/unit/ \
            -v \
            --color=no \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --alluredir=allure-results \
            -n auto \
            --tb=short

      - name: Validate raw Allure result files
        if: always()
        run: |
          test -d allure-results || (echo "Missing allure-results directory" && exit 1)
          count=$(find allure-results -type f \( -name '*-result.json' -o -name '*-container.json' \) | wc -l | tr -d ' ')
          echo "allure result/container files: $count"
          test "$count" -gt 0 || (echo "No Allure test data generated" && exit 1)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.python-version }}
          path: allure-results/
          if-no-files-found: error
          retention-days: 30

      - name: Upload HTML Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          if-no-files-found: warn
          retention-days: 30

  test-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13', '3.14']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: '2.2.1'
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-test-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
          
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: |
          poetry install --with dev --verbose
          
      - name: Verify installation
        run: |
          poetry run python --version
          poetry run pytest --version

      - name: Run smoke tests with coverage
        env:
          ALLURE_PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          poetry run pytest tests/smoke/ \
            -v \
            --color=no \
            --cov=src \
            --cov-report=xml:coverage-smoke.xml \
            --cov-report=html \
            --cov-report=term-missing \
            --alluredir=allure-results \
            -n auto \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage-smoke.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-smoke-results-${{ matrix.python-version }}
          path: allure-results/
          if-no-files-found: error
          retention-days: 30

      - name: Upload HTML Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          if-no-files-found: warn
          retention-days: 30

  allure-report:
    name: Publish Allure Report
    needs: [test, test-smoke]
    runs-on: ubuntu-latest
    if: always()
    env:
      EXPECTED_PYTHON_VERSIONS: "3.13,3.14"
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Allure
        run: npm install -g allure-commandline

      - name: Download Allure Results (keep artifact directories separate)
        uses: actions/download-artifact@v4
        with:
          pattern: allure*-results-*
          path: downloaded-allure
          merge-multiple: false

      - name: Discover and validate Allure result sources
        run: |
          mapfile -t RESULT_DIRS < <(
            find downloaded-allure -type f -name '*-result.json' -exec dirname {} \; | sort -u
          )

          echo "Discovered result directories:"
          printf ' - %s\n' "${RESULT_DIRS[@]}"

          test "${#RESULT_DIRS[@]}" -gt 0 || (echo "No Allure result directories found" && exit 1)

          smoke_count=$(find downloaded-allure -type f -path '*allure-smoke-results-*/*-result.json' | wc -l | tr -d ' ')
          echo "Smoke result files found: $smoke_count"
          test "$smoke_count" -gt 0 || (echo "No smoke Allure result files found" && exit 1)

      - name: Write Allure executor and environment metadata
        run: |
          mkdir -p allure-meta-results

          cat > allure-meta-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "${{ github.workflow }} #${{ github.run_number }}",
            "buildOrder": ${{ github.run_number }},
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          cat > allure-meta-results/environment.properties <<EOF
          Python Versions=${EXPECTED_PYTHON_VERSIONS}
          Workflow=${{ github.workflow }}
          Repository=${{ github.repository }}
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Run ID=${{ github.run_id }}
          Run Number=${{ github.run_number }}
          EOF

      - name: Generate Allure Report
        run: |
          mapfile -t RESULT_DIRS < <(
            find downloaded-allure -type f -name '*-result.json' -exec dirname {} \; | sort -u
          )

          allure generate allure-meta-results "${RESULT_DIRS[@]}" -o allure-report --clean

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
